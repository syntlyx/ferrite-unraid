name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Unraid templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XML tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Validate XML
        run: xmllint --noout ca_profile.xml ferrite/ferrite.xml icons/ferrite.svg

      - name: Validate icon
        run: |
          test -s icons/ferrite.png
          file icons/ferrite.png | grep -q "PNG image data"

      - name: Check published references
        run: |
          grep -q "ghcr.io/syntlyx/ferrite-server:latest" ferrite/ferrite.xml
          grep -q "https://raw.githubusercontent.com/syntlyx/ferrite-unraid/main/ferrite/ferrite.xml" ferrite/ferrite.xml
          grep -q "https://raw.githubusercontent.com/syntlyx/ferrite-unraid/main/icons/ferrite.png" ferrite/ferrite.xml
